<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Journal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f7f4; color: #1a1a1a; min-height: 100vh; font-size: 18px; transition: background 0.2s, color 0.2s; }
body.dark { background: #1a1a1a; color: #f0ece6; }
body.dark .card { background: #2a2a2a; border-color: #3a3a3a; }
body.dark .streak { background: #2a2a2a; border-color: #3a3a3a; color: #aaa; }
body.dark textarea { color: #f0ece6; }
body.dark .mood-btn { background: #2a2a2a; border-color: #3a3a3a; }
body.dark .mood-btn:hover { background: #333; }
body.dark .mood-btn.selected { background: #2d2b4e; border-color: #8f87d0; }
body.dark .btn { background: #2a2a2a; border-color: #3a3a3a; color: #f0ece6; }
body.dark .btn:hover { background: #333; }
body.dark .btn.primary { background: #f0ece6; color: #1a1a1a; border-color: #f0ece6; }
body.dark .ai-card { background: #2a2a2a; border-color: #3a3a3a; }
body.dark .ai-text { color: #ffffff; }
body.dark .history-item { background: #2a2a2a; border-color: #3a3a3a; }
body.dark .history { border-color: #3a3a3a; }

.theme-toggle { position: fixed; top: 1rem; right: 1rem; background: none; border: 1px solid #d0ccc4; border-radius: 20px; padding: 6px 14px; font-size: 16px; cursor: pointer; color: inherit; transition: all 0.15s; }
body.dark .theme-toggle { border-color: #3a3a3a; }

.app { max-width: 480px; margin: 0 auto; padding: 2rem 1rem; }

.header { text-align: center; margin-bottom: 2rem; }
.date { font-size: 16px; color: #888; margin-bottom: 4px; }
h1 { font-size: 28px; font-weight: 500; }
.streak { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: #fff; border: 1px solid #e8e4de; border-radius: 20px; padding: 5px 16px; font-size: 16px; color: #666; }

.cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
.card { background: #fff; border: 1px solid #e8e4de; border-radius: 14px; padding: 1rem 1.25rem; transition: border-color 0.15s; }
.card:focus-within { border-color: #b0a8e8; }
.card-label { display: flex; align-items: center; gap: 8px; font-size: 16px; color: #888; margin-bottom: 8px; }
.card-remove { margin-left: auto; background: none; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 0 4px; line-height: 1; }
.card-remove:hover { color: #999; }
.card-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 6px; }
.camera-btn { background: none; border: none; cursor: pointer; padding: 4px; opacity: 0.4; transition: opacity 0.15s; }
.camera-btn:hover { opacity: 0.8; }
.camera-btn svg { display: block; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 2rem 1.5rem; width: 300px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
body.dark .modal { background: #2a2a2a; color: #f0ece6; }
.modal-msg { font-size: 17px; margin-bottom: 1.5rem; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns .btn { flex: 1; padding: 12px; font-size: 16px; }
.num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; }
.n1 { background: #EEEDFE; color: #3C3489; }
.n2 { background: #E1F5EE; color: #085041; }
.n3 { background: #FAECE7; color: #712B13; }
textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 18px; color: #1a1a1a; resize: none; line-height: 1.6; min-height: 60px; }
textarea::placeholder { color: #bbb; }

.mood-section { margin-bottom: 1.5rem; }
.mood-label { font-size: 16px; color: #888; margin-bottom: 10px; }
.moods { display: flex; gap: 8px; }
.mood-btn { flex: 1; padding: 10px 4px; border: 1px solid #e8e4de; border-radius: 10px; background: #fff; font-size: 24px; cursor: pointer; text-align: center; transition: all 0.15s; }
.mood-btn:hover { border-color: #c0b8e0; background: #f5f3ff; }
.mood-btn.selected { border-color: #8f87d0; background: #f0eeff; }
.mood-txt { display: block; font-size: 13px; color: #888; margin-top: 3px; }

.btn { width: 100%; padding: 16px; border: 1px solid #d0ccc4; border-radius: 12px; background: #fff; font-family: inherit; font-size: 18px; font-weight: 500; color: #1a1a1a; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #f5f3f0; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: default; }
#submit-btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; }
#submit-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(143,135,208,0.5); }
#submit-btn:not(:disabled):active { transform: scale(0.97); }
.btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn.primary:hover { background: #333; }

.done-view { display: none; text-align: center; padding: 2rem 0; }
.done-icon { font-size: 60px; margin-bottom: 1rem; }
.done-msg { font-size: 24px; font-weight: 500; margin-bottom: 6px; }
.done-sub { font-size: 17px; color: #888; line-height: 1.6; margin-bottom: 1.5rem; }

.ai-card { background: #fff; border: 1px solid #e8e4de; border-radius: 14px; padding: 1rem 1.25rem; text-align: left; margin-bottom: 1.5rem; }
.ai-label { font-size: 14px; color: #bbb; letter-spacing: 0.5px; margin-bottom: 8px; }
.ai-text { font-size: 17px; color: #333; line-height: 1.75; }

.history { margin-top: 2rem; border-top: 1px solid #e8e4de; padding-top: 1.5rem; display: none; }
.history-title { font-size: 15px; color: #aaa; letter-spacing: 0.5px; margin-bottom: 12px; text-transform: uppercase; }
.history-item { background: #fff; border: 1px solid #e8e4de; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.15s; }
.history-item:hover { box-shadow: 0 2px 10px rgba(143,135,208,0.2); border-color: #c0b8e0; }
.history-date { font-size: 15px; color: #aaa; margin-bottom: 6px; }
.history-entry { font-size: 16px; color: #444; padding: 2px 0; }
.history-entry::before { content: "— "; color: #bbb; }
body.dark .history-date { color: #aaa; }
body.dark .history-entry { color: #f0ece6; }
body.dark .history-entry::before { color: #888; }
.history-photo { width: 100%; border-radius: 8px; margin-top: 8px; object-fit: cover; max-height: 160px; }

.photo-section { margin-bottom: 1.5rem; }
.photo-preview { position: relative; margin-top: 10px; display: none; }
.photo-preview img { width: 100%; border-radius: 12px; max-height: 220px; object-fit: cover; }
.photo-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: 1px dashed #c0b8e0; border-radius: 12px; background: #f5f3ff; font-family: inherit; font-size: 16px; color: #8f87d0; cursor: pointer; }
body.dark .photo-btn { background: #2a2a2a; border-color: #5a5080; color: #a09ad0; }
.done-photo { width: 100%; border-radius: 14px; margin-bottom: 1.5rem; max-height: 260px; object-fit: cover; display: none; }

.chart-section { margin-top: 2rem; border-top: 1px solid #e8e4de; padding-top: 1.5rem; display: none; }
body.dark .chart-section { border-color: #3a3a3a; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.chart-title { font-size: 15px; color: #aaa; letter-spacing: 0.5px; text-transform: uppercase; }
.chart-nav { display: flex; align-items: center; gap: 6px; }
.chart-nav-btn { background: none; border: 1px solid #e8e4de; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; color: #888; font-size: 15px; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: all 0.15s; padding: 0; }
.chart-nav-btn:hover:not(:disabled) { border-color: #8f87d0; color: #8f87d0; }
.chart-nav-btn:disabled { opacity: 0.22; cursor: default; }
.chart-range { font-size: 12px; color: #aaa; min-width: 88px; text-align: center; }
body.dark .chart-nav-btn { border-color: #3a3a3a; }
canvas { width: 100%; cursor: grab; user-select: none; }
canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 ダーク</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-msg">このカードを削除してよいですか？</div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick="confirmRemove()">削除</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="modal" style="width:340px;max-width:90vw;text-align:left;" onclick="event.stopPropagation()">
    <div id="detail-date" style="font-size:15px;color:#aaa;margin-bottom:10px;"></div>
    <div id="detail-mood" style="font-size:28px;margin-bottom:10px;"></div>
    <div id="detail-entries" style="margin-bottom:12px;"></div>
    <img id="detail-photo" src="" alt="写真" style="display:none;width:100%;border-radius:10px;margin-bottom:12px;object-fit:cover;max-height:200px;">
    <button class="btn" onclick="closeDetail()" style="margin-top:4px;">閉じる</button>
  </div>
</div>

<div class="app">
  <div id="input-view">
    <div class="header">
      <div class="date" id="today-date"></div>
      <h1>今日の感謝</h1>
      <div class="streak">🔥 <span id="streak-count">0日連続</span></div>
    </div>

    <div class="cards" id="cards">
      <div class="card">
        <div class="card-label"><span class="num n1">1</span>感謝できること</div>
        <textarea id="g1" placeholder="今日、感謝したいことは…" rows="3"></textarea>
        <div class="card-footer">
          <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhoto(this)">
          <button class="camera-btn" onclick="document.getElementById('photo-input').click()" title="写真を追加">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="5" width="22" height="16" rx="3" fill="#8f87d0"/>
              <circle cx="12" cy="13" r="4" fill="white"/>
              <circle cx="12" cy="13" r="2.2" fill="#8f87d0"/>
              <rect x="7" y="3" width="4" height="3" rx="1" fill="#8f87d0"/>
            </svg>
          </button>
        </div>
        <div class="photo-preview" id="photo-preview">
          <img id="photo-thumb" src="" alt="プレビュー">
          <button class="photo-remove" onclick="removePhoto()">✕</button>
        </div>
      </div>
    </div>

    <div class="mood-section">
      <div class="mood-label">今の気分は？</div>
      <div class="moods">
        <button class="mood-btn" data-mood="😔" onclick="selectMood(this)">😔<span class="mood-txt">つらい</span></button>
        <button class="mood-btn" data-mood="😐" onclick="selectMood(this)">😐<span class="mood-txt">普通</span></button>
        <button class="mood-btn" data-mood="🙂" onclick="selectMood(this)">🙂<span class="mood-txt">まあまあ</span></button>
        <button class="mood-btn" data-mood="😊" onclick="selectMood(this)">😊<span class="mood-txt">良い</span></button>
        <button class="mood-btn" data-mood="😄" onclick="selectMood(this)">😄<span class="mood-txt">最高</span></button>
      </div>
    </div>

    <div style="text-align:center;margin-bottom:1.5rem">
      <button id="submit-btn" onclick="submit()" disabled style="display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:50px;background:linear-gradient(135deg,#8f87d0,#b0a8e8);color:#fff;border:none;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(143,135,208,0.4);transition:all 0.2s;letter-spacing:0.5px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/></svg>
        記録する
      </button>
    </div>

    <div class="chart-section" id="chart-section">
      <div class="chart-header">
        <div class="chart-title">気分の推移</div>
        <div class="chart-nav">
          <button class="chart-nav-btn" id="chart-prev" onclick="shiftChart(10)" title="過去へ">‹</button>
          <span class="chart-range" id="chart-range"></span>
          <button class="chart-nav-btn" id="chart-next" onclick="shiftChart(-10)" title="最新へ">›</button>
        </div>
      </div>
      <canvas id="mood-chart" height="160"></canvas>
    </div>

    <div class="history" id="history-section">
      <div class="history-title">最近の記録</div>
      <div id="history-list"></div>
    </div>
  </div>

  <div class="done-view" id="done-view">
    <div class="done-icon">✨</div>
    <div class="done-msg" id="done-msg">記録できました！</div>
    <div class="done-sub">感謝を書くことで、<br>幸福感は平均25%向上するとも言われています。</div>
    <img id="done-photo" class="done-photo" src="" alt="今日の写真">
    <div class="ai-card" id="ai-card" style="display:none">
      <div class="ai-label">AI COACH</div>
      <div class="ai-text" id="ai-text">考え中…</div>
    </div>
    <button class="btn" onclick="reset()" style="margin-top:8px">最初に戻る</button>
  </div>
</div>

<script>
let selectedMood = null;
let photoBase64 = null;

function handlePhoto(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if(w > h && w > MAX) { h = h * MAX / w; w = MAX; }
      else if(h > MAX) { w = w * MAX / h; h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      document.getElementById('photo-thumb').src = 'data:image/jpeg;base64,' + photoBase64;
      document.getElementById('photo-preview').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  photoBase64 = null;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-input').value = '';
}

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent = isDark ? '☀️ ライト' : '🌙 ダーク';
  localStorage.setItem('gj_theme', isDark ? 'dark' : 'light');
}
if(localStorage.getItem('gj_theme') === 'dark') {
  document.body.classList.add('dark');
  document.getElementById('theme-btn').textContent = '☀️ ライト';
}

function getToday() {
  return new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function getTodayKey() {
  return new Date().toISOString().split('T')[0];
}

document.getElementById('today-date').textContent = getToday();


function updateStreak() {
  let data = JSON.parse(localStorage.getItem('gj_streak') || '{"count":0,"lastDate":""}');
  const today = getTodayKey();
  const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(data.lastDate === today) {
    document.getElementById('streak-count').textContent = data.count+'日連続';
    return data.count;
  }
  if(data.lastDate === yesterday) data.count++;
  else data.count = 1;
  data.lastDate = today;
  localStorage.setItem('gj_streak', JSON.stringify(data));
  document.getElementById('streak-count').textContent = data.count+'日連続';
  return data.count;
}
updateStreak();
loadHistory();

document.getElementById('g1').addEventListener('input', checkReady);

let removeTarget = null;

function confirmRemove() {
  if(removeTarget) {
    checkReady();
    removeTarget = null;
  }
  closeModal();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  removeTarget = null;
}

function openDetail(index) {
  const h = JSON.parse(localStorage.getItem('gj_history') || '[]');
  const r = h[index];
  if(!r) return;
  document.getElementById('detail-date').textContent = r.date;
  document.getElementById('detail-mood').textContent = r.mood || '';
  document.getElementById('detail-entries').innerHTML = r.entries.map(e=>`<div class="history-entry" style="margin-bottom:6px;">${e}</div>`).join('');
  const photo = document.getElementById('detail-photo');
  if(r.photo) {
    photo.src = 'data:image/jpeg;base64,' + r.photo;
    photo.style.display = 'block';
  } else {
    photo.style.display = 'none';
  }
  document.getElementById('detail-overlay').classList.add('show');
}

function closeDetail(e) {
  if(!e || e.target === document.getElementById('detail-overlay')) {
    document.getElementById('detail-overlay').classList.remove('show');
  }
}

function checkReady() {
  const hasText = document.getElementById('g1').value.trim() !== '';
  const hasMood = selectedMood !== null;
  document.getElementById('submit-btn').disabled = !(hasText && hasMood);
}

function selectMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMood = btn.dataset.mood;
  checkReady();
}

function saveEntry(entries) {
  let h = JSON.parse(localStorage.getItem('gj_history') || '[]');
  h.unshift({date:getToday(), key:getTodayKey(), entries, mood:selectedMood, photo:photoBase64||null});
  if(h.length>20) h=h.slice(0,20);
  localStorage.setItem('gj_history', JSON.stringify(h));
}

function loadHistory() {
  let h = JSON.parse(localStorage.getItem('gj_history') || '[]');
  if(!h.length) return;
  document.getElementById('history-section').style.display = 'block';
  document.getElementById('history-list').innerHTML = h.slice(0,3).map((r,i)=>`
    <div class="history-item" onclick="openDetail(${i})">
      <div class="history-date">${r.date} ${r.mood||''}</div>
      ${r.entries.map(e=>`<div class="history-entry">${e}</div>`).join('')}
      ${r.photo ? `<img class="history-photo" src="data:image/jpeg;base64,${r.photo}" alt="写真">` : ''}
    </div>
  `).join('');
  const moodData = h.filter(r=>r.mood);
  if(moodData.length >= 2) {
    document.getElementById('chart-section').style.display = 'block';
    requestAnimationFrame(()=>drawMoodChart(h));
  }
}

const CHART_WINDOW = 10;
let chartOffset = 0; // 今日からの日数オフセット（0=最新10日）
let chartAllData = [];
let chartDataByKey = {};
let chartDragStartX = null;
let chartDragStartOffset = 0;

function drawMoodChart(h) {
  const moodScore = {'😔':1,'😐':2,'🙂':3,'😊':4,'😄':5};
  chartAllData = h.filter(r => r.mood && moodScore[r.mood] && r.key);
  chartDataByKey = {};
  chartAllData.forEach(r => { chartDataByKey[r.key] = r; });
  chartOffset = 0;
  renderChart();
}

function shiftChart(delta) {
  chartOffset = Math.max(0, chartOffset + delta);
  renderChart();
}

function renderChart() {
  const moodScore = {'😔':1,'😐':2,'🙂':3,'😊':4,'😄':5};
  if(chartAllData.length < 1) return;

  // 今日を起点に10日分のカレンダースロットを生成
  const today = new Date();
  const oldestKey = chartAllData[chartAllData.length - 1].key;
  const daysSinceOldest = Math.floor((today - new Date(oldestKey)) / 86400000);
  const maxOffset = Math.max(0, daysSinceOldest - CHART_WINDOW + 1);
  chartOffset = Math.min(chartOffset, maxOffset);

  const slots = [];
  for(let i = CHART_WINDOW - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i - chartOffset);
    slots.push(d.toISOString().split('T')[0]);
  }

  const prevBtn = document.getElementById('chart-prev');
  const nextBtn = document.getElementById('chart-next');
  if(prevBtn) prevBtn.disabled = chartOffset >= maxOffset;
  if(nextBtn) nextBtn.disabled = chartOffset <= 0;

  const rangeEl = document.getElementById('chart-range');
  if(rangeEl) rangeEl.textContent = slots[0].slice(5) + '〜' + slots[CHART_WINDOW-1].slice(5);

  // 各スロットにデータを対応付け
  const plotPoints = slots.map((key, i) => {
    const r = chartDataByKey[key];
    return { i, label: key.slice(5), score: r ? moodScore[r.mood] : null };
  });
  const dataPoints = plotPoints.filter(p => p.score != null);
  if(dataPoints.length < 1) return;

  document.getElementById('chart-section').style.display = 'block';
  const canvas = document.getElementById('mood-chart');
  canvas.width = canvas.offsetWidth || 400;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = 160;
  const pad = {top:16, right:16, bottom:32, left:32};
  ctx.clearRect(0, 0, W, H);
  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? '#3a3a3a' : '#e8e4de';
  const textColor = isDark ? '#888' : '#aaa';
  const xStep = (W - pad.left - pad.right) / (CHART_WINDOW - 1);

  // 横グリッド（気分レベル）
  for(let i = 1; i <= 5; i++) {
    const y = pad.top + (H - pad.top - pad.bottom) * (1 - (i-1)/4);
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = textColor; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(['','😔','😐','🙂','😊','😄'][i], pad.left - 4, y + 4);
  }

  // 縦グリッド（各日）
  slots.forEach((_, idx) => {
    const x = pad.left + idx * xStep;
    ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
  });

  // X軸ラベル（最初・最後・中間）
  [0, 4, 9].forEach(idx => {
    ctx.fillStyle = textColor; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(slots[idx].slice(5), pad.left + idx * xStep, H - pad.bottom + 14);
  });

  // 折れ線
  if(dataPoints.length >= 2) {
    ctx.strokeStyle = '#8f87d0'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    dataPoints.forEach((p, idx) => {
      const x = pad.left + p.i * xStep;
      const y = pad.top + (H - pad.top - pad.bottom) * (1 - (p.score - 1) / 4);
      idx === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  // ドット
  dataPoints.forEach(p => {
    const x = pad.left + p.i * xStep;
    const y = pad.top + (H - pad.top - pad.bottom) * (1 - (p.score - 1) / 4);
    ctx.fillStyle = '#8f87d0';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
  });
}

// タッチ・マウスドラッグ（1日単位）
(function() {
  const PX_PER_DAY = 30;
  function onDragStart(x) { chartDragStartX = x; chartDragStartOffset = chartOffset; }
  function onDragMove(x) {
    if(chartDragStartX === null) return;
    const delta = Math.round((chartDragStartX - x) / PX_PER_DAY);
    chartOffset = Math.max(0, chartDragStartOffset + delta);
    renderChart();
  }
  function onDragEnd() { chartDragStartX = null; }
  const canvas = document.getElementById('mood-chart');
  canvas.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), {passive:true});
  canvas.addEventListener('touchmove',  e => onDragMove(e.touches[0].clientX),  {passive:true});
  canvas.addEventListener('touchend',   onDragEnd, {passive:true});
  canvas.addEventListener('mousedown',  e => onDragStart(e.clientX));
  canvas.addEventListener('mousemove',  e => onDragMove(e.clientX));
  canvas.addEventListener('mouseup',    onDragEnd);
  canvas.addEventListener('mouseleave', onDragEnd);
})();

async function submit() {
  const entries = [];
  document.querySelectorAll('#cards textarea').forEach(t=>{
    const v = t.value.trim();
    if(v) entries.push(v);
  });
  const g1=entries[0]||'', g2=entries[1]||'', g3=entries[2]||'';
  saveEntry(entries);
  let streak = JSON.parse(localStorage.getItem('gj_streak')||'{"count":1}').count;
  document.getElementById('input-view').style.display='none';
  document.getElementById('done-view').style.display='block';
  document.getElementById('done-msg').textContent = streak+'日連続達成！🎉';

  if(photoBase64) {
    const dp = document.getElementById('done-photo');
    dp.src = 'data:image/jpeg;base64,' + photoBase64;
    dp.style.display = 'block';
  }

  {
    const card = document.getElementById('ai-card');
    card.style.display='block';
    try {
      const textContent = `今日の感謝:\n${entries.map((e,i)=>`${i+1}. ${e}`).join('\n')}\n気分: ${selectedMood||'未記録'}`;
      const userContent = photoBase64
        ? [
            {type:'image', source:{type:'base64', media_type:'image/jpeg', data:photoBase64}},
            {type:'text', text:textContent}
          ]
        : textContent;

      const res = await fetch('/.netlify/functions/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:300,
          system:'あなたは温かく共感的なウェルネスコーチです。ユーザーの感謝と写真（あれば）を見て、一日を労い、ポジティブな気づきを3〜4文で伝えてください。押しつけがましくなく、自然に。日本語で。',
          messages:[{role:'user', content:userContent}]
        })
      });
      const data = await res.json();
      if(data.error) {
        document.getElementById('ai-text').textContent = 'エラー: ' + data.error.message;
      } else {
        document.getElementById('ai-text').textContent = data.content?.[0]?.text || 'ありがとうございます。今日も記録できましたね。';
      }
    } catch(e) {
      document.getElementById('ai-text').textContent = '今日も感謝を見つけられましたね。続けることが力になります。';
    }
  }
}

function reset() {
  document.getElementById('done-view').style.display='none';
  document.getElementById('done-photo').style.display='none';
  document.getElementById('input-view').style.display='block';
  document.getElementById('g1').value='';
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  selectedMood=null;
  photoBase64=null;
  document.getElementById('photo-preview').style.display='none';
  document.getElementById('photo-input').value='';
  document.getElementById('submit-btn').disabled=true;
  loadHistory();
}
